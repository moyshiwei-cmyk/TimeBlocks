  const base=new Date();base.setDate(base.getDate()+bizWeekOffset*7);
  const start=new Date(base);start.setDate(base.getDate()-base.getDay());
  const end=new Date(start);end.setDate(start.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en',{month:'short',day:'numeric'});
  document.getElementById('biz-week-label').textContent=`${fmt(start)} – ${fmt(end)}`;
  renderBusiness();
}

function renderBusiness(){
  const biz=getBiz();
  // Employee list
  const el=document.getElementById('emp-list');el.innerHTML='';
  biz.employees.forEach(emp=>{
    const shifts=biz.shifts.filter(s=>s.empId===emp.id);
    const hours=shifts.reduce((s,sh)=>s+(sh.end-sh.start),0);
    const item=document.createElement('div');item.className='emp-item';
    item.innerHTML=`<div class="emp-avatar-s" style="background:${emp.color}">${emp.initials}</div><div class="emp-info-s"><div class="emp-name-s">${emp.name}</div><div class="emp-role-s">${emp.role}</div></div><div class="emp-hours-s">${hours}h</div><div class="emp-edit-btns"><button title="Edit" onclick="editEmp(${emp.id})">✏️</button><button title="Delete" onclick="deleteEmp(${emp.id})">🗑</button></div>`;
    el.appendChild(item);
  });
  // Stats
  const allShifts=biz.shifts;
  const totalH=allShifts.reduce((s,sh)=>s+(sh.end-sh.start),0);
  document.getElementById('bs-shifts').textContent=allShifts.length;
  document.getElementById('bs-hours').textContent=totalH+'h';
  document.getElementById('bs-emp').textContent=biz.employees.length;
  let conflicts=0;
  biz.employees.forEach(emp=>{
    const s=allShifts.filter(s=>s.empId===emp.id).sort((a,b)=>a.start-b.start);
    for(let i=1;i<s.length;i++)if(s[i].start<s[i-1].end)conflicts++;
  });
  const ce=document.getElementById('bs-conf');ce.textContent=conflicts;ce.style.color=conflicts>0?'#FF4444':'var(--accent)';
  // Biz grid
  const bizGrid=document.getElementById('biz-grid');
  bizGrid.querySelectorAll('.emp-col').forEach(c=>c.remove());
  const tc=document.getElementById('biz-time-col');tc.innerHTML='';
  const hdrSpacer=document.createElement('div');hdrSpacer.className='biz-time-hdr';tc.appendChild(hdrSpacer);
  for(let h=0;h<24;h++){const lbl=document.createElement('div');lbl.className='biz-time-lbl';lbl.textContent=h.toString().padStart(2,'0')+':00';tc.appendChild(lbl);}
  biz.employees.forEach(emp=>{
    const col=document.createElement('div');col.className='emp-col';
    const hdr=document.createElement('div');hdr.className='emp-col-header';
    hdr.innerHTML=`<div class="emp-hdr-avatar" style="background:${emp.color}">${emp.initials}</div><div class="emp-hdr-info"><div class="emp-hdr-name">${emp.name.split(' ')[0]}</div><div class="emp-hdr-role">${emp.role}</div></div>`;
    col.appendChild(hdr);
    for(let h=0;h<24;h++){const row=document.createElement('div');row.className='emp-row-bg';row.style.top=(h*BIZ_ROW_H+40)+'px';col.appendChild(row);}
    biz.shifts.filter(s=>s.empId===emp.id).forEach(sh=>{
      const overlap=biz.shifts.filter(s2=>s2.empId===emp.id&&s2.id!==sh.id&&sh.start<s2.end&&sh.end>s2.start).length>0;
      const el=document.createElement('div');el.className='biz-shift'+(overlap?' conflict-shift':'');
      el.style.cssText=`top:${sh.start*BIZ_ROW_H+40}px;height:${(sh.end-sh.start)*BIZ_ROW_H-4}px;background:${emp.color};color:#1C1C1C`;
      el.innerHTML=`<div class="biz-shift-label">${sh.label}</div><div class="biz-shift-time">${sh.start.toString().padStart(2,'0')}:00–${sh.end.toString().padStart(2,'0')}:00</div>`;
      col.appendChild(el);
    });
    bizGrid.appendChild(col);
  });
  // Init week label
  if(!document.getElementById('biz-week-label').textContent.includes('–')){
    const base=new Date();const start=new Date(base);start.setDate(base.getDate()-base.getDay());const end=new Date(start);end.setDate(start.getDate()+6);
    const fmt=d=>d.toLocaleDateString('en',{month:'short',day:'numeric'});
    document.getElementById('biz-week-label').textContent=`${fmt(start)} – ${fmt(end)}`;
  }
  // Auto-scroll to 9am
  setTimeout(()=>{const gw=document.getElementById('biz-grid-wrap');if(gw)gw.scrollTop=9*BIZ_ROW_H+40-60;},100);
}

function editEmp(id){
  const biz=getBiz();const emp=biz.employees.find(e=>e.id===id);if(!emp)return;
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button><div class="modal-title" style="font-size:17px;margin-bottom:12px">Edit Employee</div><input class="tf-input" id="edit-name" value="${emp.name}" placeholder="Name"/><input class="tf-input" id="edit-role" value="${emp.role}" placeholder="Role"/><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${EMP_COLORS.map(c=>`<div onclick="document.querySelectorAll('.ecp').forEach(x=>x.style.outline='none');this.style.outline='2.5px solid #333'" class="ecp" data-c="${c}" style="width:24px;height:24px;border-radius:5px;background:${c};cursor:pointer;${c===emp.color?'outline:2.5px solid #333':''}"></div>`).join('')}</div><button class="modal-btn" onclick="doEditEmp(${id},this)">Save Changes</button></div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});document.body.appendChild(ov);
}
function doEditEmp(id,btn){
  const ov=btn.closest('.modal-overlay');
  const biz=getBiz();const emp=biz.employees.find(e=>e.id===id);if(!emp){ov.remove();return;}
  emp.name=document.getElementById('edit-name').value.trim()||emp.name;
  emp.role=document.getElementById('edit-role').value.trim()||emp.role;
  const sel=ov.querySelector('.ecp[style*="outline: 2.5px"]');
  if(sel)emp.color=sel.dataset.c;
  emp.initials=emp.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  saveBiz(biz);ov.remove();renderBusiness();showToast('Employee updated ✓');
}
function deleteEmp(id){
  if(!confirm('Delete this employee and their shifts?'))return;
  const biz=getBiz();
  biz.employees=biz.employees.filter(e=>e.id!==id);
  biz.shifts=biz.shifts.filter(s=>s.empId!==id);
  saveBiz(biz);renderBusiness();showToast('Employee removed');
}
function showAddEmpModal(){
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button><div class="modal-title" style="font-size:17px;margin-bottom:12px">Add Employee</div><input class="tf-input" id="new-emp-name" placeholder="Full Name"/><input class="tf-input" id="new-emp-role" placeholder="Role / Position"/><div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${EMP_COLORS.map((c,i)=>`<div onclick="document.querySelectorAll('.nacp').forEach(x=>x.style.outline='none');this.style.outline='2.5px solid #333'" class="nacp" data-c="${c}" style="width:24px;height:24px;border-radius:5px;background:${c};cursor:pointer;${i===0?'outline:2.5px solid #333':''}"></div>`).join('')}</div><button class="modal-btn" onclick="doAddEmp(this)">Add Employee</button></div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});document.body.appendChild(ov);
}
function doAddEmp(btn){
  const ov=btn.closest('.modal-overlay');
  const name=document.getElementById('new-emp-name').value.trim();
  const role=document.getElementById('new-emp-role').value.trim();
  if(!name){showToast('Enter a name');return;}
  const sel=ov.querySelector('.nacp[style*="outline: 2.5px"]');
  const color=sel?sel.dataset.c:EMP_COLORS[0];
  const biz=getBiz();
  biz.employees.push({id:biz.nextEmpId++,name,role:role||'Staff',color,initials:name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()});
  saveBiz(biz);ov.remove();renderBusiness();showToast(`${name} added! ✓`);
}

// ────────────────────────────────────────────
//  PROFILE
// ────────────────────────────────────────────
function renderProfile(){
  const inner=document.getElementById('profile-inner');inner.innerHTML='';
  const s=getStreakState(),sc=getScoreState(),cc=getCharState();
  const level=Math.floor((sc.total||0)/500)+1;
  const xpInLevel=(sc.total||0)%500,xpPct=xpInLevel/500*100;
  const ac=CHARACTERS.find(c=>c.id===sc.activeChar)||CHARACTERS[0];
  inner.innerHTML=`
    <div class="profile-hero">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar">${ac.emoji}</div>
        <div class="profile-level-badge">Lv ${level}</div>
      </div>
      <div class="profile-stats">
        <div class="profile-name">Time Architect</div>
        <div class="profile-tagline">Active: ${ac.name} (${ac.rarity}) · ${ac.bonus}</div>
        <div class="profile-score-row">
          <div class="p-stat"><div class="p-stat-val">${(sc.total||0).toLocaleString()}</div><div class="p-stat-lbl">Points</div></div>
          <div class="p-stat"><div class="p-stat-val">${s.count}</div><div class="p-stat-lbl">Streak</div></div>
          <div class="p-stat"><div class="p-stat-val">${s.shields||0}</div><div class="p-stat-lbl">Shields</div></div>
          <div class="p-stat"><div class="p-stat-val">${cc.unlocked.length}/${CHARACTERS.length}</div><div class="p-stat-lbl">Characters</div></div>
        </div>
        <div class="xp-section">
          <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
          <div class="xp-label"><span>Lv ${level}</span><span>${xpInLevel}/500 XP</span><span>Lv ${level+1}</span></div>
        </div>
      </div>
    </div>
  `;
  ['common','rare','epic','legendary'].forEach(rarity=>{
    const chars=CHARACTERS.filter(c=>c.rarity===rarity);
    const sec=document.createElement('div');
    const rc={common:COMFORT_COLORS[0].hex,rare:'#5B8DD9',epic:'#9B59B6',legendary:'#E6A817'};
    sec.innerHTML=`<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:${rc[rarity]};margin:18px 0 10px">${rarity} · ${chars.length} characters</div>`;
    const grid=document.createElement('div');grid.className='chars-grid';
    chars.forEach(ch=>{
      const unlocked=cc.unlocked.includes(ch.id);
      const isActive=sc.activeChar===ch.id;
      const card=document.createElement('div');
      card.className=`char-card rarity-${ch.rarity}${!unlocked?' locked':''}${isActive?' active-char':''}`;
      card.innerHTML=`${isActive?'<div class="char-active-badge">Active</div>':''}${!unlocked?'<div style="position:absolute;top:7px;right:7px;font-size:12px;opacity:.7">🔒</div>':''}
      <span class="char-emoji">${ch.emoji}</span><div class="char-name">${ch.name}</div>
      <div class="char-rarity">${ch.rarity}</div><div class="char-bonus">${ch.bonus}</div>
      <div class="char-pts">${unlocked?'✓ Unlocked':(ch.pts===0?'Starter':ch.pts.toLocaleString()+' pts')}</div>`;
      if(unlocked&&!isActive){
        card.title=`Activate ${ch.name}`;
        card.addEventListener('click',()=>{sc.activeChar=ch.id;ss('SCORE',sc);renderProfile();updateStreakUI();showToast(`${ch.emoji} ${ch.name} activated!`);beep('click');});
      }
      grid.appendChild(card);
    });
    sec.appendChild(grid);inner.appendChild(sec);
  });
}

// ────────────────────────────────────────────
//  MODAL
// ────────────────────────────────────────────
function showModal({title,body,btn,onClose}){
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button><div class="modal-title">${title}</div>${body}<button class="modal-btn" onclick="this.closest('.modal-overlay').remove()">${btn||'OK'}</button></div>`;
  ov.addEventListener('click',e=>{if(e.target===ov){if(onClose)onClose();ov.remove();}});
  document.body.appendChild(ov);
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),2800);
}

// ────────────────────────────────────────────
//  INIT
// ────────────────────────────────────────────
function init(){
  // Unlock starter
  const cc=getCharState();if(!cc.unlocked.includes('neko')){cc.unlocked.push('neko');ss('CHARS',cc);}
  // Build UI
  buildYearList();
  buildTimeGrid();
  buildColourGrids();
  renderPresets();
  renderMissions();
  setupGridDrop();
  updateNowLine();
  updateStreakUI();
  updateNotifBadge();
  setInterval(updateNowLine,60000);
  setInterval(updateMissions,8000);
  // Auto-open current year/month
  const yl=document.querySelector(`.year-label[data-year="${today.getFullYear()}"]`);
  if(yl){
    const ml=document.getElementById(`months-${today.getFullYear()}`);
    ml.classList.add('open');yl.classList.add('expanded');
    setTimeout(()=>{
      const mi=document.querySelector(`.month-item[data-month="${today.getMonth()}"][data-year="${today.getFullYear()}"]`);
      if(mi){mi.classList.add('sel-month');openDatePanel(today.getFullYear(),today.getMonth());}
    },80);
  }
  // Load today's workspace
  setCurrentDate(fmtDate(today));
  // Scroll to current time
  setTimeout(()=>{const ws=document.getElementById('ws-scroll');if(ws)ws.scrollTop=Math.max(0,today.getHours()*ROW_H-120);},200);
  // Global click = close DD
  document.addEventListener('click',()=>closeDD());
  // Keyboard hint
  showToast('💡 SELECT a block → DELETE key removes it · CTRL+drag to duplicate');
}

init();
</script>
