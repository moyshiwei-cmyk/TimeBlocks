<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TimeFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF7F2;--sb-bg:#F0EBE3;--sb-hover:#E6DED5;
  --accent:#B87333;--accent2:#D49A6A;--text:#2C2420;--muted:#9C8B82;
  --border:#DDD6CC;--ws-bg:#F5F0E8;--sh:rgba(44,36,32,.10);--row-h:66px;
  --nav-bg:#1E1A17;--nav-w:68px;
  --common:#8B9DC3;--rare:#5B8DD9;--epic:#9B59B6;--legendary:#E6A817
}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ═══════════════════════════════
   APP SHELL
═══════════════════════════════ */
#app{display:flex;height:100vh;width:100vw;overflow:hidden}
#page-area{display:flex;flex:1;overflow:hidden;min-width:0}

/* ═══════════════════════════════
   LEFT NAVIGATION
═══════════════════════════════ */
#left-nav{
  width:var(--nav-w);flex-shrink:0;background:var(--nav-bg);
  display:flex;flex-direction:column;height:100vh;align-items:center;
  padding:10px 0 14px;z-index:50;border-right:1px solid rgba(255,255,255,.04)
}
.nav-logo{
  font-size:22px;margin-bottom:18px;cursor:default;
  filter:drop-shadow(0 2px 6px rgba(184,115,51,.5));
  transition:transform .3s;user-select:none
}
.nav-logo:hover{transform:scale(1.15) rotate(-5deg)}
.nav-items{display:flex;flex-direction:column;gap:2px;flex:1;width:100%;padding:0 7px}
.nav-item{
  width:100%;padding:10px 0 8px;border-radius:10px;border:none;
  background:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  transition:background .18s,transform .15s;position:relative;user-select:none
}
.nav-item:hover{background:rgba(255,255,255,.07);transform:translateX(2px)}
.nav-item.active{background:rgba(184,115,51,.22)}
.nav-item .ni-icon{font-size:19px;line-height:1;transition:transform .2s}
.nav-item:hover .ni-icon{transform:scale(1.12)}
.nav-item .ni-label{font-size:8px;color:rgba(255,255,255,.45);font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.02em;line-height:1;margin-top:1px}
.nav-item.active .ni-label{color:var(--accent2)}
.nav-item.active .ni-icon{filter:drop-shadow(0 0 4px rgba(184,115,51,.6))}
.nav-badge{
  position:absolute;top:5px;right:7px;min-width:15px;height:15px;
  background:#FF4444;border-radius:8px;font-size:8px;color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;
  padding:0 3px;border:1.5px solid var(--nav-bg);animation:badgePulse 2s infinite
}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.nav-divider{width:36px;height:1px;background:rgba(255,255,255,.08);margin:6px auto}
.nav-bottom{display:flex;flex-direction:column;gap:2px;width:100%;padding:0 7px}

/* ═══════════════════════════════
   CALENDAR PANEL (LEFT)
═══════════════════════════════ */
#cal-panel{
  width:174px;flex-shrink:0;background:var(--sb-bg);
  border-right:1px solid var(--border);height:100vh;
  overflow-y:auto;display:flex;flex-direction:column;
  transition:width .28s cubic-bezier(.4,0,.2,1),opacity .22s
}
#cal-panel.collapsed{width:0;overflow:hidden;opacity:0;pointer-events:none}
#date-panel{
  width:0;overflow:hidden;
  transition:width .28s cubic-bezier(.4,0,.2,1);
  border-right:none;background:var(--sb-bg);
  height:100vh;overflow-y:auto;flex-shrink:0
}
#date-panel.open{width:148px;border-right:1px solid var(--border)}
.sb-head{
  padding:13px 11px 10px;font-family:'Playfair Display',serif;font-size:10px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;position:sticky;top:0;
  background:var(--sb-bg);z-index:3;min-height:40px
}
.sb-head-title{white-space:nowrap;overflow:hidden}
.sb-close{width:19px;height:19px;border-radius:50%;border:none;background:var(--border);color:var(--muted);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;flex-shrink:0}
.sb-close:hover{background:var(--accent);color:#fff}
.year-group{border-bottom:1px solid var(--border)}
.year-label{padding:8px 11px;font-family:'DM Mono',monospace;font-size:11.5px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .12s;user-select:none}
.year-label:hover{background:var(--sb-hover)}
.year-label.cur-yr{color:var(--accent);font-weight:600}
.year-label .chev{font-size:8px;transition:transform .2s;color:var(--muted)}
.year-label.expanded .chev{transform:rotate(180deg)}
.month-list{display:none;background:var(--bg)}
.month-list.open{display:block}
.month-item{padding:5px 11px 5px 20px;font-size:11px;cursor:pointer;color:var(--muted);transition:all .12s;border-left:2px solid transparent}
.month-item:hover{color:var(--text);background:var(--sb-hover);border-left-color:var(--accent2)}
.month-item.sel-month{color:var(--accent);border-left-color:var(--accent);font-weight:500}
.month-item.cur-month{font-style:italic}
.ds-month-label{padding:6px 11px;font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);background:var(--sb-bg)}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:6px 5px 8px}
.day-hdr{font-size:7.5px;text-align:center;color:var(--muted);font-weight:700;padding:2px 0}
.day-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'DM Mono',monospace;border-radius:3px;cursor:pointer;transition:background .1s,color .1s}
.day-cell:not(.empty):hover{background:var(--accent);color:#fff}
.day-cell.today{background:var(--accent);color:#fff;font-weight:700}
.day-cell.empty{cursor:default}

/* ═══════════════════════════════
   VIEW WRAP + TOOLBAR
═══════════════════════════════ */
#view-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#toolbar{
  flex-shrink:0;display:flex;align-items:center;background:var(--bg);
  border-bottom:1px solid var(--border);padding:0 14px;gap:8px;height:44px;z-index:30
}
#tf-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--muted);opacity:.4;letter-spacing:.02em;flex-shrink:0}
#date-display{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);font-weight:500;flex-shrink:0}
#streak-widget{
  margin-left:auto;display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#fff8f3,#fef0e4);border:1px solid #f0d5b8;
  border-radius:10px;padding:5px 11px;box-shadow:0 2px 6px rgba(184,115,51,.07);flex-shrink:0
}
.sw-fire{font-size:16px;cursor:default}
.sw-info{display:flex;flex-direction:column;gap:1px}
.sw-line1{display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600}
.sw-streak-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);font-weight:700}
.sw-score-val{font-family:'DM Mono',monospace;font-size:11px;color:#6a5acd;font-weight:700}
.sw-bar-wrap{height:3px;background:#e8ddd5;border-radius:2px;width:64px;overflow:hidden}
.sw-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width .5s ease}
.sw-next{font-size:8px;color:var(--muted)}
.shield-badge{font-size:11px}
/* Notification bell */
#notif-btn{
  width:32px;height:32px;border-radius:8px;border:none;background:var(--sb-bg);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;position:relative;transition:background .15s;flex-shrink:0
}
#notif-btn:hover{background:var(--border)}
#notif-count{
  position:absolute;top:-3px;right:-3px;min-width:15px;height:15px;
  background:#FF4444;border-radius:8px;font-size:8px;color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;
  padding:0 3px;border:1.5px solid var(--bg)
}

/* Date nav bar */
#date-nav-bar{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:6px 16px;background:var(--bg);border-bottom:1px solid var(--border);
  font-size:11px
}
#date-nav-bar.hidden{display:none}
.dnb-arrow{
  width:26px;height:26px;border-radius:7px;border:1px solid var(--border);
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:background .12s,border-color .12s;flex-shrink:0
}
.dnb-arrow:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#dnb-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);font-weight:500;min-width:140px;text-align:center}
.dnb-today-btn{
  padding:3px 10px;border-radius:12px;border:1px solid var(--border);
  background:#fff;font-size:10px;cursor:pointer;color:var(--muted);
  transition:all .12s;font-family:'DM Sans',sans-serif
}
.dnb-today-btn:hover,.dnb-today-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ═══════════════════════════════
   VIEWS
═══════════════════════════════ */
.tab-view{display:none;flex:1;overflow:hidden;flex-direction:column}
.tab-view.active{display:flex}

/* ─── MAIN VIEW ─── */
#ws-scroll{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;position:relative}
#time-col{flex-shrink:0;width:54px;background:var(--bg);border-right:1px solid var(--border);height:calc(var(--row-h)*24)}
.time-label{height:var(--row-h);display:flex;align-items:flex-start;justify-content:flex-end;padding:5px 7px 0 0;font-family:'DM Mono',monospace;font-size:8.5px;color:var(--muted);border-bottom:1px solid var(--border)}
.time-label.cur-time-row{color:var(--accent);font-weight:700}
#grid-area{flex:1;position:relative;height:calc(var(--row-h)*24);min-width:200px}
.grid-row{position:absolute;left:0;right:0;height:var(--row-h);border-bottom:1px solid rgba(200,190,180,.4)}
.grid-row:nth-child(odd){background:rgba(255,255,255,.35)}
.grid-row:nth-child(even){background:rgba(220,210,200,.1)}
.grid-row.cur-hr-row{background:rgba(184,115,51,.07)}
.grid-row.drop-target{background:rgba(184,115,51,.18)!important;transition:background .1s}
#now-line{position:absolute;left:0;right:0;height:2px;background:var(--accent);z-index:8;pointer-events:none;display:flex;align-items:center}
#now-line::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent);margin-left:-4px;flex-shrink:0}

/* ═══════════════════════════════
   BLOCKS
═══════════════════════════════ */
.block{
  position:absolute;min-width:130px;width:220px;height:calc(var(--row-h) - 6px);
  border-radius:7px;padding:7px 26px 7px 10px;cursor:move;
  box-shadow:0 2px 10px var(--sh);user-select:none;overflow:visible;
  transition:box-shadow .15s,transform .1s,opacity .15s;z-index:10
}
.block:hover{box-shadow:0 6px 20px rgba(44,36,32,.16);z-index:20}
.block.dragging{
  box-shadow:0 18px 40px rgba(44,36,32,.26);z-index:100;opacity:.92;
  transform:rotate(.5deg) scale(1.07)!important;
  transition:box-shadow .15s,transform .15s!important
}
.block.selected{outline:2.5px solid var(--accent);outline-offset:2px;z-index:15}
.block.conflict{outline:2.5px solid #FF4444;outline-offset:2px;animation:conflictPulse .5s ease}
@keyframes conflictPulse{0%,100%{outline-color:#FF4444}50%{outline-color:#ff8888}}
.block-text{outline:none;font-family:'DM Sans',sans-serif;font-size:11.5px;line-height:1.5;min-height:22px;word-break:break-word;cursor:text;height:100%;overflow:auto}
.block-text:empty::before{content:attr(data-ph);opacity:.3;pointer-events:none}
.block-menu-btn{position:absolute;top:3px;right:3px;width:19px;height:19px;border-radius:4px;border:none;background:rgba(128,128,128,.16);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;z-index:3;line-height:1}
.block:hover .block-menu-btn{opacity:1}
.block-menu-btn:hover{background:rgba(128,128,128,.3)}
.block-resize-r{position:absolute;top:4px;bottom:4px;right:-3px;width:6px;cursor:col-resize;border-radius:3px;background:rgba(128,128,128,.2);opacity:0;transition:opacity .15s}
.block:hover .block-resize-r{opacity:1}
.block-resize-b{position:absolute;bottom:2px;left:10px;right:26px;height:5px;cursor:s-resize;border-radius:3px;background:rgba(128,128,128,.2);opacity:0;transition:opacity .15s}
.block:hover .block-resize-b{opacity:1}
/* +pts popup */
.pts-pop{position:fixed;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:#6a5acd;pointer-events:none;z-index:9998;white-space:nowrap;text-shadow:0 1px 4px rgba(106,90,205,.3);animation:ptsFloat 1.4s ease forwards}
@keyframes ptsFloat{0%{opacity:1;transform:translateY(0) scale(1)}20%{opacity:1;transform:translateY(-14px) scale(1.15)}100%{opacity:0;transform:translateY(-58px) scale(.8)}}

/* ═══════════════════════════════
   RIGHT SIDEBAR (BLOCKS PANEL)
═══════════════════════════════ */
#blocks-panel{
  width:210px;flex-shrink:0;height:100vh;overflow-y:auto;
  background:var(--sb-bg);border-left:1px solid var(--border);
  display:flex;flex-direction:column;transition:width .28s,opacity .2s
}
#blocks-panel.hidden{width:0;overflow:hidden;opacity:0;pointer-events:none}
.rs-head{padding:13px 11px 9px;border-bottom:1px solid var(--border);background:var(--sb-bg);position:sticky;top:0;z-index:3}
.rs-head h2{font-family:'Playfair Display',serif;font-size:15px;font-weight:600}
.rs-head p{font-size:9px;color:var(--muted);margin-top:2px}
.rs-section{padding:11px;border-bottom:1px solid var(--border)}
.rs-title{font-size:9px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin-bottom:8px;font-family:'Playfair Display',serif}
.colour-cat{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:7px 0 4px;font-weight:600}
.colour-cat:first-child{margin-top:0}
.colour-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.colour-swatch{
  height:32px;border-radius:6px;cursor:grab;border:2.5px solid transparent;
  transition:transform .12s,box-shadow .12s;display:flex;align-items:center;justify-content:center
}
.colour-swatch:hover{transform:translateY(-3px) scale(1.08);box-shadow:0 6px 14px var(--sh)}
.colour-swatch:active{cursor:grabbing}
/* Mission items */
.mission-item{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid rgba(220,210,200,.5)}
.mission-item:last-child{border-bottom:none}
.mission-icon{font-size:15px;flex-shrink:0}
.mission-body{flex:1;min-width:0}
.mission-label{font-size:10.5px;font-weight:500;line-height:1.3}
.mission-track{height:3px;background:#e8ddd5;border-radius:2px;margin:3px 0;overflow:hidden}
.mission-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width .5s}
.mission-meta{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace}
.mission-item.done .mission-label{text-decoration:line-through;opacity:.4}
/* Presets */
.preset-item{background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px 8px;margin-bottom:4px;display:flex;align-items:center;gap:7px;cursor:grab;transition:box-shadow .14s}
.preset-item:hover{box-shadow:0 3px 10px var(--sh)}
.preset-item:active{cursor:grabbing}
.preset-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.08)}
.preset-txt{font-size:10.5px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preset-del{width:15px;height:15px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;border-radius:3px;opacity:0;transition:all .1s;flex-shrink:0;line-height:1}
.preset-item:hover .preset-del{opacity:1}
.preset-del:hover{background:#ff5252;color:#fff}
.no-presets{font-size:10px;color:var(--muted);text-align:center;padding:10px;font-style:italic;line-height:1.7}

/* ═══════════════════════════════
   CHAT SYSTEM
═══════════════════════════════ */
#chat-overlay{
  position:fixed;inset:0;z-index:200;pointer-events:none;
  background:rgba(0,0,0,0);transition:background .25s
}
#chat-overlay.open{pointer-events:all;background:rgba(0,0,0,.18)}
#chat-panel{
  position:absolute;top:0;right:-380px;width:360px;height:100vh;
  background:#fff;box-shadow:-4px 0 32px rgba(0,0,0,.14);
  display:flex;flex-direction:column;
  transition:right .3s cubic-bezier(.4,0,.2,1)
}
#chat-overlay.open #chat-panel{right:0}
.chat-header{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0
}
.chat-header-back{
  width:28px;height:28px;border-radius:8px;border:none;background:var(--sb-bg);
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0
}
.chat-header-back:hover{background:var(--border)}
.chat-header-avatar{
  width:34px;height:34px;border-radius:50%;background:var(--sb-bg);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0
}
.chat-header-info{flex:1;min-width:0}
.chat-header-name{font-size:13px;font-weight:600}
.chat-header-status{font-size:10px;color:var(--muted)}
.chat-header-status.online{color:#4CAF50}
.chat-close{
  width:28px;height:28px;border-radius:8px;border:none;background:none;
  cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;
  justify-content:center;transition:background .15s;flex-shrink:0
}
.chat-close:hover{background:var(--sb-bg)}
/* Friend list */
#chat-friend-list{flex:1;overflow-y:auto;padding:8px}
.chat-friend-item{
  display:flex;align-items:center;gap:10px;padding:10px 10px;
  border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:2px
}
.chat-friend-item:hover{background:var(--sb-bg)}
.cf-avatar-wrap{position:relative;flex-shrink:0}
.cf-avatar{width:38px;height:38px;border-radius:50%;background:var(--sb-hover);display:flex;align-items:center;justify-content:center;font-size:20px}
.cf-online-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:#4CAF50;border:2px solid #fff}
.cf-offline-dot{background:#9C8B82}
.cf-info{flex:1;min-width:0}
.cf-name{font-size:12.5px;font-weight:500}
.cf-preview{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cf-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.cf-time{font-size:9.5px;color:var(--muted);font-family:'DM Mono',monospace}
.cf-unread{width:17px;height:17px;border-radius:50%;background:var(--accent);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
/* Chat messages */
#chat-messages-view{display:none;flex:1;flex-direction:column;overflow:hidden}
#chat-messages-view.active{display:flex}
#chat-msgs-scroll{flex:1;overflow-y:auto;padding:12px 12px 6px;display:flex;flex-direction:column;gap:8px}
.msg-wrap{display:flex;align-items:flex-end;gap:7px}
.msg-wrap.me{flex-direction:row-reverse}
.msg-avatar{width:26px;height:26px;border-radius:50%;background:var(--sb-hover);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-bottom:2px}
.msg-bubble{
  max-width:68%;padding:8px 12px;border-radius:16px;font-size:12.5px;line-height:1.5;
  position:relative;word-break:break-word
}
.msg-wrap.them .msg-bubble{background:var(--sb-bg);border-bottom-left-radius:4px}
.msg-wrap.me .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:8.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;white-space:nowrap}
.msg-wrap.me .msg-time{text-align:right}
.typing-indicator{display:flex;align-items:center;gap:4px;padding:8px 14px;background:var(--sb-bg);border-radius:16px;border-bottom-left-radius:4px;width:fit-content}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typingDot 1.2s ease infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
#chat-input-wrap{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  border-top:1px solid var(--border);background:var(--bg);flex-shrink:0
}
#chat-input{
  flex:1;padding:8px 13px;border:1px solid var(--border);border-radius:20px;
  font-family:'DM Sans',sans-serif;font-size:12.5px;outline:none;background:#fff;
  transition:border-color .15s
}
#chat-input:focus{border-color:var(--accent)}
#chat-send-btn{
  width:34px;height:34px;border-radius:50%;border:none;background:var(--accent);
  color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .15s;flex-shrink:0
}
#chat-send-btn:hover{background:var(--accent2);transform:scale(1.08)}

/* ═══════════════════════════════
   NOTIFICATION PANEL
═══════════════════════════════ */
#notif-overlay{position:fixed;inset:0;z-index:150;pointer-events:none}
#notif-overlay.open{pointer-events:all}
#notif-dropdown{
  position:fixed;top:48px;right:14px;width:300px;max-height:360px;overflow-y:auto;
  background:#fff;border:1px solid var(--border);border-radius:14px;
  box-shadow:0 12px 36px rgba(0,0,0,.14);z-index:151;
  opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;
  transition:opacity .2s,transform .2s
}
#notif-dropdown.open{opacity:1;transform:none;pointer-events:all}
.notif-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600}
.notif-clear{font-size:10px;color:var(--accent);cursor:pointer;font-weight:400;background:none;border:none;padding:0}
.notif-clear:hover{text-decoration:underline}
.notif-item-d{display:flex;align-items:flex-start;gap:9px;padding:9px 14px;border-bottom:1px solid rgba(220,210,200,.4);transition:background .12s}
.notif-item-d:hover{background:var(--sb-bg)}
.notif-icon-d{font-size:16px;flex-shrink:0;margin-top:1px}
.notif-body-d{flex:1}
.notif-text-d{font-size:11.5px;line-height:1.4}
.notif-time-d{font-size:9.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}
.notif-unread-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}

/* ═══════════════════════════════
   DROPDOWN PORTAL
═══════════════════════════════ */
#dd-portal{position:fixed;z-index:9999;top:0;left:0;pointer-events:none}
.block-dropdown{position:fixed;pointer-events:all;background:#fff;border:1px solid #e0d8d0;border-radius:12px;box-shadow:0 12px 36px rgba(0,0,0,.16);padding:13px;width:238px;animation:ddIn .13s ease}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.dd-section-title{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:7px;font-family:'Playfair Display',serif}
.dd-swatches{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px}
.dd-swatch{width:25px;height:25px;border-radius:5px;cursor:pointer;border:2.5px solid transparent;transition:transform .1s,box-shadow .1s}
.dd-swatch:hover{transform:scale(1.2);box-shadow:0 3px 8px rgba(0,0,0,.18)}
.dd-swatch.cur-sw{border-color:#333}
.dd-divider{border:none;border-top:1px solid #ede8e2;margin:8px 0}
.dd-btn{width:100%;text-align:left;padding:6px 9px;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;border-radius:6px;display:flex;align-items:center;gap:8px;transition:background .1s;color:var(--text)}
.dd-btn:hover{background:#f5f0e8}
.dd-btn.danger{color:#c0392b}
.dd-btn.danger:hover{background:#fde8e6}
.dd-cat{font-size:8px;text-transform:uppercase;letter-spacing:.1em;color:#b0a090;margin:6px 0 4px;font-weight:600}

/* ═══════════════════════════════
   ANALYTICS VIEW
═══════════════════════════════ */
#view-analytics,#view-social,#view-profile{background:var(--ws-bg);overflow-y:auto}
.an-inner{padding:24px 28px;max-width:900px;margin:0 auto}
.an-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:600;margin-bottom:3px}
.an-sub{font-size:11px;color:var(--muted);margin-bottom:22px}
.an-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.an-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:17px;box-shadow:0 2px 10px var(--sh)}
.an-card.full{grid-column:1/-1}
.an-card-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;margin-bottom:3px}
.an-card-sub{font-size:10px;color:var(--muted);margin-bottom:13px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:13px;text-align:center;box-shadow:0 2px 8px var(--sh)}
.stat-val{font-family:'DM Mono',monospace;font-size:21px;font-weight:700;color:var(--accent)}
.stat-lbl{font-size:9px;color:var(--muted);margin-top:2px}
#pie-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
#pie-legend{display:flex;flex-direction:column;gap:6px;flex:1;min-width:130px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:10.5px}
.legend-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
#bar-chart{display:flex;align-items:flex-end;gap:4px;height:108px;padding-bottom:20px}
.bar-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end}
.bar-fill{width:100%;border-radius:3px 3px 0 0;transition:height .6s ease;min-height:2px;position:relative}
.bar-fill:hover::after{content:attr(data-tip);position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:#333;color:#fff;font-size:8px;padding:2px 5px;border-radius:4px;white-space:nowrap;pointer-events:none;z-index:5}
.bar-lbl{font-size:7.5px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace}
.prod-bar{height:9px;background:#e8ddd5;border-radius:4px;overflow:hidden;margin:4px 0}
.prod-fill{height:100%;border-radius:4px;transition:width .8s ease}

/* ═══════════════════════════════
   SOCIAL VIEW
═══════════════════════════════ */
.social-inner{padding:24px 28px;max-width:880px;margin:0 auto}
.social-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.an-card.social-card{padding:0;overflow:hidden}
.lb-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(220,210,200,.4);transition:background .12s}
.lb-row:hover{background:#f8f4ef}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;width:24px;text-align:center;flex-shrink:0}
.lb-avatar{width:34px;height:34px;border-radius:50%;background:var(--sb-bg);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:12.5px;font-weight:500}
.lb-meta{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
.lb-score{font-family:'DM Mono',monospace;font-size:12px;color:#6a5acd;font-weight:700}
.rank-1{color:#E6A817}.rank-2{color:#8B9DC3}.rank-3{color:#B87333}
.online-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4CAF50;margin-left:4px;vertical-align:middle}
.activity-item{display:flex;align-items:flex-start;gap:9px;padding:10px 16px;border-bottom:1px solid rgba(220,210,200,.4)}
.activity-icon{font-size:15px;flex-shrink:0;margin-top:2px}
.activity-text{font-size:12px;line-height:1.5}
.activity-time{font-size:9.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px}

/* ═══════════════════════════════
   BUSINESS VIEW
═══════════════════════════════ */
#view-business{flex-direction:row!important;background:var(--ws-bg)}
#biz-sidebar{width:210px;flex-shrink:0;background:var(--sb-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;overflow-y:auto}
#biz-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#biz-toolbar{flex-shrink:0;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
#biz-grid-wrap{flex:1;overflow:auto}
#biz-grid{display:flex;position:relative;min-width:max-content}
.biz-time-col{width:50px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg);position:sticky;left:0;z-index:5}
.biz-time-hdr{height:40px;border-bottom:1px solid var(--border);background:var(--bg)}
.biz-time-lbl{height:44px;display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 6px 0 0;font-family:'DM Mono',monospace;font-size:8.5px;color:var(--muted);border-bottom:1px solid var(--border)}
.emp-col{width:150px;flex-shrink:0;border-right:1px solid rgba(200,190,180,.3);position:relative}
.emp-col-header{
  height:40px;display:flex;align-items:center;padding:4px 8px;gap:7px;
  border-bottom:1px solid var(--border);background:var(--bg);
  position:sticky;top:0;z-index:3
}
.emp-hdr-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.emp-hdr-info{min-width:0}
.emp-hdr-name{font-size:10.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emp-hdr-role{font-size:8.5px;color:var(--muted)}
.emp-row-bg{position:absolute;left:0;right:0;height:44px;border-bottom:1px solid rgba(200,190,180,.25)}
.emp-row-bg:nth-child(odd){background:rgba(255,255,255,.3)}
.biz-shift{position:absolute;left:3px;right:3px;border-radius:5px;padding:3px 6px;font-size:10px;cursor:move;box-shadow:0 1px 6px rgba(0,0,0,.08);z-index:5;overflow:hidden;display:flex;flex-direction:column;justify-content:center;gap:1px;transition:box-shadow .15s}
.biz-shift:hover{box-shadow:0 4px 14px rgba(0,0,0,.14);z-index:10}
.biz-shift-label{font-size:9.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.biz-shift-time{font-size:8px;opacity:.7;font-family:'DM Mono',monospace}
.biz-shift.conflict-shift{outline:2px solid #FF4444}
.emp-item{display:flex;align-items:center;gap:8px;padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .12s;position:relative}
.emp-item:hover{background:var(--sb-hover)}
.emp-avatar-s{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.emp-info-s{flex:1;min-width:0}
.emp-name-s{font-size:11.5px;font-weight:500}
.emp-role-s{font-size:9.5px;color:var(--muted)}
.emp-hours-s{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);flex-shrink:0}
.emp-edit-btns{display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);gap:4px}
.emp-item:hover .emp-edit-btns{display:flex}
.emp-edit-btns button{width:20px;height:20px;border-radius:4px;border:none;background:var(--border);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.emp-edit-btns button:hover{background:var(--accent);color:#fff}
.biz-btn{padding:6px 13px;border:none;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:11.5px;cursor:pointer;font-weight:500;transition:all .15s}
.biz-btn.primary{background:var(--accent);color:#fff}
.biz-btn.primary:hover{background:var(--accent2)}
.biz-btn.secondary{background:var(--sb-hover);color:var(--text)}
.biz-btn.secondary:hover{background:var(--border)}
.biz-stat{text-align:center;padding:8px 10px;background:#fff;border:1px solid var(--border);border-radius:8px;min-width:72px}
.biz-stat-val{font-family:'DM Mono',monospace;font-size:17px;font-weight:700;color:var(--accent)}
.biz-stat-lbl{font-size:8.5px;color:var(--muted);margin-top:1px}
/* Business date nav */
.biz-date-nav{display:flex;align-items:center;gap:6px;margin-left:auto}
.biz-date-nav button{padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:10.5px;cursor:pointer;transition:all .12s;font-family:'DM Sans',sans-serif}
.biz-date-nav button:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#biz-week-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);font-weight:500;min-width:120px;text-align:center}

/* ═══════════════════════════════
   PROFILE VIEW
═══════════════════════════════ */
.profile-inner{padding:24px 28px;max-width:900px;margin:0 auto}
.profile-hero{display:flex;align-items:center;gap:22px;background:#fff;border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:22px;box-shadow:0 2px 12px var(--sh)}
.profile-avatar-wrap{position:relative;flex-shrink:0}
.profile-avatar{width:70px;height:70px;border-radius:50%;font-size:34px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fef0e4,#f5ddb8);border:3px solid var(--accent);box-shadow:0 4px 16px rgba(184,115,51,.2)}
.profile-level-badge{position:absolute;bottom:-4px;right:-4px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;font-family:'DM Mono',monospace;border:2px solid #fff}
.profile-stats{flex:1}
.profile-name{font-family:'Playfair Display',serif;font-size:21px;font-weight:600}
.profile-tagline{font-size:11px;color:var(--muted);margin-bottom:10px}
.profile-score-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.p-stat{display:flex;flex-direction:column;align-items:center;background:var(--sb-bg);padding:7px 12px;border-radius:8px;min-width:65px}
.p-stat-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--accent)}
.p-stat-lbl{font-size:8.5px;color:var(--muted);margin-top:1px}
.xp-section{margin-top:11px}
.xp-bar-wrap{height:7px;background:#e8ddd5;border-radius:4px;overflow:hidden;margin-top:3px}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#6a5acd,#9b84ee);border-radius:4px;transition:width .8s ease}
.xp-label{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:3px}
.chars-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:12px;margin-top:4px}
.char-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center;transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;overflow:hidden}
.char-card:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(0,0,0,.1)}
.char-card.locked{opacity:.4;filter:grayscale(.8);cursor:default}
.char-card.active-char{border-color:var(--accent);box-shadow:0 0 0 2px rgba(184,115,51,.22)}
.char-emoji{font-size:32px;margin-bottom:5px;display:block}
.char-name{font-size:11.5px;font-weight:600}
.char-rarity{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.char-bonus{font-size:8.5px;color:var(--muted);margin-top:2px}
.char-pts{font-size:8.5px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:3px}
.char-active-badge{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;font-size:7px;padding:1px 5px;border-radius:5px;font-weight:700;text-transform:uppercase}
.rarity-common .char-rarity{color:var(--common)}
.rarity-rare .char-rarity{color:var(--rare)}
.rarity-epic .char-rarity{color:var(--epic)}
.rarity-legendary .char-rarity{color:var(--legendary)}
.rarity-rare:hover{box-shadow:0 8px 22px rgba(91,141,217,.22)}
.rarity-epic:hover{box-shadow:0 8px 22px rgba(155,89,182,.22)}
.rarity-legendary{border-color:rgba(230,168,23,.4);background:linear-gradient(135deg,#fff9ee,#fff)}
.rarity-legendary:hover{box-shadow:0 8px 26px rgba(230,168,23,.28)}

/* ═══════════════════════════════
   MODALS / POPUPS
═══════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:9990;display:flex;align-items:center;justify-content:center;animation:fadeOv .2s ease}
@keyframes fadeOv{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:18px;padding:26px;box-shadow:0 24px 64px rgba(0,0,0,.2);max-width:400px;width:92%;position:relative;animation:modalIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes modalIn{from{transform:scale(.6) translateY(20px);opacity:0}to{transform:none;opacity:1}}
.modal-close{position:absolute;top:12px;right:14px;border:none;background:none;font-size:17px;cursor:pointer;color:var(--muted);line-height:1}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;text-align:center;margin-bottom:12px}
.modal-btn{display:block;width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:500;cursor:pointer;margin-top:13px;transition:background .15s}
.modal-btn:hover{background:var(--accent2)}
.tf-input{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s;margin-bottom:8px}
.tf-input:focus{border-color:var(--accent)}
/* Char unlock */
.char-unlock-card{background:linear-gradient(135deg,#fefefe,#f8f4ee);border:2px solid var(--border);border-radius:12px;padding:14px;text-align:center;margin:10px 0}
.char-unlock-emoji{font-size:52px;display:block;animation:charReveal .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes charReveal{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
/* Milestone popup */
#milestone-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.7);background:#fff;border:1.5px solid #f0d5b8;border-radius:18px;padding:22px 30px;text-align:center;z-index:10001;box-shadow:0 24px 60px rgba(0,0,0,.18);opacity:0;transition:opacity .3s,transform .3s;pointer-events:none}
#milestone-popup.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:all}
.mp-emoji{font-size:38px;margin-bottom:7px}
.mp-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:600}
.mp-sub{font-size:12px;color:var(--muted);margin-top:4px}
.mp-score{font-family:'DM Mono',monospace;font-size:26px;color:#6a5acd;font-weight:700;margin:9px 0}
.mp-close{margin-top:11px;padding:7px 20px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .15s}
.mp-close:hover{background:var(--accent2)}
/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--text);color:#FAF7F2;padding:7px 16px;border-radius:22px;font-size:11.5px;opacity:0;transition:opacity .25s,transform .25s;z-index:10000;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* Confetti */
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9995;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(-10px) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ═══════════════════════════════
   MOBILE BOTTOM NAV
═══════════════════════════════ */
#bottom-nav{display:none}

@media(max-width:768px){
  #left-nav{display:none}
  #blocks-panel{display:none}
  #cal-panel{display:none}
  #date-panel{display:none}
  #bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;height:60px;
    background:var(--nav-bg);z-index:100;border-top:1px solid rgba(255,255,255,.06);
    padding:0 4px
  }
  .bn-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;border:none;background:none;cursor:pointer;padding:6px 2px;
    transition:background .15s;border-radius:8px;margin:4px 2px

function fmtDate(d){return d.toISOString().slice(0,10)}
function snapY(y){return Math.max(0,Math.round(y/ROW_H)*ROW_H)}
function datePlus(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function fmtDisplayDate(d){
  const t=fmtDate(new Date());
  if(d===t)return'Today';
  if(d===fmtDate(datePlus(new Date(),-1)))return'Yesterday';
  if(d===fmtDate(datePlus(new Date(),1)))return'Tomorrow';
  const dt=new Date(d);
  return dt.toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'});
}
function formatTime(ts){
  const d=new Date(ts);
  return d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:true});
}
function seededRng(seed){
  let h=0;for(let i=0;i<seed.length;i++)h=Math.imul(31,h)+seed.charCodeAt(i)|0;
  return()=>{h^=h<<13;h^=h>>17;h^=h<<5;return(h>>>0)/0xFFFFFFFF};
}

// ────────────────────────────────────────────

function beep(type='place'){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const plays={
      place(){
        [0,.07].forEach(o=>{
          const osc=ctx.createOscillator(),g=ctx.createGain();
          osc.connect(g);g.connect(ctx.destination);
          osc.type='sawtooth';osc.frequency.setValueAtTime(180,ctx.currentTime+o);
          osc.frequency.exponentialRampToValueAtTime(60,ctx.currentTime+o+.06);
          g.gain.setValueAtTime(.15,ctx.currentTime+o);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+o+.07);
          osc.start(ctx.currentTime+o);osc.stop(ctx.currentTime+o+.09);
        });
      },
      delete(){
        const osc=ctx.createOscillator(),g=ctx.createGain();
        osc.connect(g);g.connect(ctx.destination);osc.type='sine';
        osc.frequency.setValueAtTime(400,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(100,ctx.currentTime+.15);
        g.gain.setValueAtTime(.12,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.18);
        osc.start(ctx.currentTime);osc.stop(ctx.currentTime+.2);
      },
      click(){
        const osc=ctx.createOscillator(),g=ctx.createGain();
        osc.connect(g);g.connect(ctx.destination);osc.type='sine';osc.frequency.value=600;
        g.gain.setValueAtTime(.07,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.06);
        osc.start(ctx.currentTime);osc.stop(ctx.currentTime+.07);
      },
      milestone(){
        [0,.1,.2,.35].forEach((o,i)=>{
          const f=[523,659,784,1047][i];
          const osc=ctx.createOscillator(),g=ctx.createGain();
          osc.connect(g);g.connect(ctx.destination);osc.type='triangle';osc.frequency.value=f;
          g.gain.setValueAtTime(.11,ctx.currentTime+o);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+o+.3);
          osc.start(ctx.currentTime+o);osc.stop(ctx.currentTime+o+.35);
        });
      },
      unlock(){
        [0,.08,.16,.24,.36].forEach((o,i)=>{
          const f=[392,523,659,784,1047][i];
          const osc=ctx.createOscillator(),g=ctx.createGain();
          osc.connect(g);g.connect(ctx.destination);osc.type='sine';osc.frequency.value=f;
          g.gain.setValueAtTime(.13,ctx.currentTime+o);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+o+.25);
          osc.start(ctx.currentTime+o);osc.stop(ctx.currentTime+o+.3);
        });
      },
      chat(){
        const osc=ctx.createOscillator(),g=ctx.createGain();
        osc.connect(g);g.connect(ctx.destination);osc.type='sine';
        osc.frequency.setValueAtTime(880,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(1100,ctx.currentTime+.05);
        g.gain.setValueAtTime(.08,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.1);
        osc.start(ctx.currentTime);osc.stop(ctx.currentTime+.12);
      }
    };
    plays[type]&&plays[type]();
    setTimeout(()=>ctx.close(),800);
  }catch(e){}
}

}

function updateNotifBadge(){

function getStreakState(){return gs('STREAK')||{lastDate:null,count:0,shields:0}}
function getScoreState(){return gs('SCORE')||{total:0,activeChar:'neko'}}
function getCharState(){return gs('CHARS')||{unlocked:['neko']}}

function getActiveCharBonus(){
  const sc=getScoreState(),cc=getCharState();
  if(!cc.unlocked.includes(sc.activeChar))return 0;
  return(CHARACTERS.find(c=>c.id===sc.activeChar)||{bonusVal:0}).bonusVal;
}
function awardPoints(pts,x,y){
  const bonus=getActiveCharBonus();
  const actual=Math.round(pts*(1+bonus));
  const sc=getScoreState();const old=sc.total;
  sc.total+=actual;ss('SCORE',sc);
  checkCharUnlocks(old,sc.total);
  updateStreakUI();
  if(x!=null)showPtsPopup(actual,x,y);
  return actual;
}
function checkCharUnlocks(old,nw){
  const cc=getCharState();
  CHARACTERS.forEach(ch=>{
    if(ch.pts>old&&ch.pts<=nw&&!cc.unlocked.includes(ch.id)){
      cc.unlocked.push(ch.id);ss('CHARS',cc);
      setTimeout(()=>showCharUnlock(ch),700);
    }
  });
}
function showCharUnlock(ch){
  beep('unlock');confetti(40);
  const rc={common:'#8B9DC3',rare:'#5B8DD9',epic:'#9B59B6',legendary:'#E6A817'};
  showModal({
    title:'New Character Unlocked! 🎉',
    body:`<div class="char-unlock-card rarity-${ch.rarity}"><span class="char-unlock-emoji">${ch.emoji}</span><div style="font-size:17px;font-weight:600">${ch.name}</div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:${rc[ch.rarity]};margin-top:3px">${ch.rarity}</div><div style="font-size:11px;color:var(--muted);margin-top:5px">${ch.bonus} passive bonus</div></div>`,
    btn:'Set Active in Profile',
    onClose:()=>{}
  });
  addNotif('🎉',`You unlocked the ${ch.name} character!`);
}

function checkAndUpdateStreak(){
  const ts=fmtDate(new Date());let s=getStreakState();
  if(s.lastDate===ts){updateStreakUI();return 0;}
  const prev=s.count;
  const yest=new Date();yest.setDate(yest.getDate()-1);
  if(s.lastDate===fmtDate(yest)){
    s.count+=1;
    if(s.count===5||s.count===10){
      s.shields=(s.shields||0)+1;
      showToast('🛡️ Streak Shield earned!');
      addNotif('🛡️','You earned a Streak Shield!');
    }
  } else if(s.lastDate){
    if((s.shields||0)>0){s.shields--;s.count+=1;showToast('🛡️ Shield used! Streak saved!');}
    else{s.count=1;}
  } else{s.count=1;}
  s.lastDate=ts;ss('STREAK',s);
  const om=Math.floor(prev/10),nm=Math.floor(s.count/10);
  if(nm>om)setTimeout(()=>{beep('milestone');showMilestonePopup(s.count,(nm-om)*1000);addNotif('🏆',`${s.count}-day streak milestone! +${(nm-om)*1000} pts`);},700);
  updateStreakUI();
  return DAY_POINTS[Math.min(s.count,10)];
}
function updateStreakUI(){
  const s=getStreakState(),sc=getScoreState();
  document.getElementById('streak-count').textContent=s.count;
  document.getElementById('streak-score').textContent=(sc.total||0).toLocaleString();
  const p=(s.count%10)/10*100;
  document.getElementById('streak-bar').style.width=p+'%';
  const tn=10-(s.count%10);
  document.getElementById('streak-next').textContent=tn===10&&s.count>0?`🎯 Milestone at ${s.count+10}d`:`${tn}d to +1k pts ⭐`;
  document.getElementById('streak-fire').textContent=s.count>=30?'🔥🔥🔥':s.count>=20?'🔥🔥':'🔥';
  const sb=document.getElementById('shield-badge');
  if((s.shields||0)>0){sb.style.display='';sb.title=`${s.shields} shield${s.shields>1?'s':''}`;}
  else sb.style.display='none';
}
function showMilestonePopup(days,pts){
  document.getElementById('mp-title').textContent=`${days}-Day Streak! 🎉`;
  document.getElementById('mp-sub').textContent=`Scheduled for ${days} consecutive days!`;
  document.getElementById('mp-score').textContent=`+${pts.toLocaleString()} pts`;
  document.getElementById('milestone-popup').classList.add('show');
}
function closeMilestone(){document.getElementById('milestone-popup').classList.remove('show')}

//  DAILY MISSIONS
// ────────────────────────────────────────────
function getDailyMissions(){
  const ts=fmtDate(new Date());let ms=gs('MISSIONS');
  if(ms&&ms.date===ts)return ms.missions;
  const rng=seededRng(ts);const pool=[...MISSION_POOL];const picked=[];
  while(picked.length<3&&pool.length){const i=Math.floor(rng()*pool.length);picked.push({...pool.splice(i,1)[0],progress:0,done:false});}
  ms={date:ts,missions:picked};ss('MISSIONS',ms);return ms.missions;
}
function updateMissions(){
  const blocks=getBlocksData();
  const totalH=blocks.reduce((s,b)=>s+b.durationH,0);
  const s=getStreakState();
  const ms=gs('MISSIONS');if(!ms||!ms.missions)return;
  let changed=false;
  ms.missions.forEach(m=>{
    if(m.done)return;
    let prog=0;
    if(m.unit==='blocks')prog=blocks.length;
    else if(m.unit==='hours')prog=totalH;
    else if(m.unit==='colors')prog=new Set(blocks.map(b=>b.hex)).size;
    else if(m.unit==='morning')prog=blocks.some(b=>b.startH>=6&&b.startH<12)?1:0;
    else if(m.unit==='evening')prog=blocks.some(b=>b.startH>=18&&b.startH<22)?1:0;
    else if(m.unit==='streak')prog=s.count;
    m.progress=prog;
    if(prog>=m.target&&!m.done){
      m.done=true;changed=true;
      awardPoints(m.reward);
      showToast(`🎯 Mission done: "${m.label}" +${m.reward} pts!`);
      addNotif('🎯',`Mission complete: "${m.label}"`);
    }
  });
  if(changed)ss('MISSIONS',ms);
  renderMissions();
}
function renderMissions(){
  const list=document.getElementById('missions-list');if(!list)return;
  const missions=getDailyMissions();list.innerHTML='';
  missions.forEach(m=>{
    const pct=Math.min(100,m.progress/m.target*100);
    const item=document.createElement('div');item.className='mission-item'+(m.done?' done':'');
    item.innerHTML=`<div class="mission-icon">${m.icon}</div><div class="mission-body"><div class="mission-label">${m.label}</div><div class="mission-track"><div class="mission-fill" style="width:${pct}%"></div></div><div class="mission-meta">${Math.min(m.progress,m.target)}/${m.target} · +${m.reward}pts</div></div><span style="font-size:14px">${m.done?'✅':'○'}</span>`;
    list.appendChild(item);
  });
}

// ────────────────────────────────────────────
//  BLOCK OVERLAP
// ────────────────────────────────────────────
function hasOverlap(y,h,excludeEl=null){
  const blocks=document.querySelectorAll('#grid-area .block');
  for(const b of blocks){
    if(b===excludeEl)continue;
    const bY=parseFloat(b.style.top)||0;
    const bH=b.offsetHeight||(ROW_H-6);
    if(y<bY+bH&&y+h>bY)return true;
  }
  return false;
}
function findFreeSlot(y,h,excludeEl=null){
  let tryY=snapY(y);
  if(!hasOverlap(tryY,h,excludeEl))return tryY;
  // Try downward
  let down=tryY;
  while(down+h<=24*ROW_H){down+=ROW_H;if(!hasOverlap(down,h,excludeEl))return down;}
  // Try upward
  let up=tryY;
  while(up>0){up-=ROW_H;if(up>=0&&!hasOverlap(up,h,excludeEl))return up;}
  return tryY;// fallback
}

function getBlocksData(){
  return Array.from(document.querySelectorAll('#grid-area .block')).map(b=>({
    hex:b.dataset.hex,fg:b.dataset.fg,
    text:(b.querySelector('.block-text')||{}).textContent||'',
    startH:(parseFloat(b.style.top)||0)/ROW_H,
    durationH:(b.offsetHeight||ROW_H-6)/ROW_H,
  }));
}
let _blockId=0;
function createBlock(x,y,text,color,w,h,id){
  const c=color||COMFORT_COLORS[0];
  const grid=document.getElementById('grid-area');
  const blockH=h||(ROW_H-6);
  const blockW=w||220;
  const freeY=hasOverlap(y,blockH)?findFreeSlot(y,blockH):y;
  _blockId++;
  const bid=id||`b${_blockId}`;
  const block=document.createElement('div');
  block.className='block';block.dataset.bid=bid;block.style.left=x+'px';block.style.top=freeY+'px';
  block.style.width=blockW+'px';block.style.height=blockH+'px';
  applyColor(block,c);
  const txt=document.createElement('div');txt.className='block-text';txt.contentEditable='true';
  txt.spellcheck=true;txt.dataset.ph='Type here…';txt.style.color=c.fg;
  if(text)txt.textContent=text;
  // Stop click from deselecting when typing
  txt.addEventListener('mousedown',e=>e.stopPropagation());
  txt.addEventListener('input',()=>{updateMissions();saveWorkspace();});
  const btn=document.createElement('button');btn.className='block-menu-btn';btn.textContent='⋯';btn.style.color=c.fg;
  btn.addEventListener('click',e=>{e.stopPropagation();openDD(block,btn);beep('click');});
  const resizeR=document.createElement('div');resizeR.className='block-resize-r';
  resizeR.addEventListener('mousedown',e=>{e.stopPropagation();resizeBlockW(e,block);});
  const resizeB=document.createElement('div');resizeB.className='block-resize-b';
  resizeB.addEventListener('mousedown',e=>{e.stopPropagation();resizeBlockH(e,block);});
  block.appendChild(txt);block.appendChild(btn);block.appendChild(resizeR);block.appendChild(resizeB);
  // Block click = select
  block.addEventListener('mousedown',e=>{
    if(e.target===txt||e.target===btn||e.target===resizeR||e.target===resizeB||e.target.closest('.block-dropdown'))return;
    // CTRL + drag = duplicate
    if(e.ctrlKey||e.metaKey){
      e.preventDefault();
      const clone=createBlock(x+20,freeY+ROW_H,txt.textContent,c,blockW,blockH);
      saveWorkspace();dragBlock(e,clone);return;
    }
    selectBlock(block);
    dragBlock(e,block);
  });
  grid.appendChild(block);
  if(!text)setTimeout(()=>txt.focus(),40);
  return block;
}
function applyColor(block,c){
  block.style.background=c.hex;block.dataset.hex=c.hex;block.dataset.fg=c.fg;block.dataset.name=c.name||'';
  block.style.border=c.hex==='#FAFAE0'?'1px solid #ccc':'none';
  const txt=block.querySelector('.block-text');const btn=block.querySelector('.block-menu-btn');
  if(txt)txt.style.color=c.fg;if(btn)btn.style.color=c.fg;
}
function selectBlock(el){
  if(selectedBlock&&selectedBlock!==el)selectedBlock.classList.remove('selected');
  selectedBlock=el;
  if(el)el.classList.add('selected');
}
// Keyboard: DELETE = remove selected, ESC = deselect
document.addEventListener('keydown',e=>{
  if((e.key==='Delete'||e.key==='Backspace')&&selectedBlock&&document.activeElement.className!=='block-text'&&!document.activeElement.isContentEditable){
    beep('delete');selectedBlock.remove();selectedBlock=null;saveWorkspace();updateMissions();
  }
  if(e.key==='Escape'){selectBlock(null);closeDD();}
});
// Click grid background = deselect
document.getElementById('grid-area')?.addEventListener('mousedown',e=>{
  if(e.target.id==='grid-area'||e.target.classList.contains('grid-row'))selectBlock(null);
});

// ────────────────────────────────────────────
//  DRAG / RESIZE
// ────────────────────────────────────────────
function dragBlock(e,block){
  e.preventDefault();
  const grid=document.getElementById('grid-area');
  const br=block.getBoundingClientRect();
  const ox=e.clientX-br.left,oy=e.clientY-br.top;
  const origH=block.offsetHeight;
  block.classList.add('dragging');block.style.zIndex=100;
  const onMove=ev=>{
    const gr=grid.getBoundingClientRect();
    block.style.left=Math.max(0,ev.clientX-gr.left-ox)+'px';
    block.style.top=Math.max(0,ev.clientY-gr.top-oy)+'px';
    // Hover highlight row
    const row=Math.floor((ev.clientY-gr.top)/ROW_H);
    document.querySelectorAll('.grid-row.drop-target').forEach(r=>r.classList.remove('drop-target'));
    const rows=document.querySelectorAll('.grid-row');
    if(rows[row])rows[row].classList.add('drop-target');
  };
  const onUp=()=>{
    block.classList.remove('dragging');block.style.zIndex='';
    document.querySelectorAll('.grid-row.drop-target').forEach(r=>r.classList.remove('drop-target'));
    const rawY=parseFloat(block.style.top)||0;
    const snapped=snapY(rawY);
    const freeY=hasOverlap(snapped,origH,block)?findFreeSlot(snapped,origH,block):snapped;
    block.style.top=freeY+'px';
    saveWorkspace();updateMissions();
    document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
  };
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
}
function resizeBlockH(e,block){
  e.preventDefault();
  const sy=e.clientY,sh=block.offsetHeight;
  const onMove=ev=>{block.style.height=Math.max(ROW_H-6,sh+(ev.clientY-sy))+'px';};
  const onUp=()=>{
    const rows=Math.max(1,Math.round(block.offsetHeight/ROW_H));
    block.style.height=(rows*ROW_H-6)+'px';
    saveWorkspace();updateMissions();
    document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
  };
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
}
function resizeBlockW(e,block){
  e.preventDefault();
  const sx=e.clientX,sw=block.offsetWidth;
  const onMove=ev=>{block.style.width=Math.max(130,sw+(ev.clientX-sx))+'px';};
  const onUp=()=>{saveWorkspace();document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
}

function setupGridDrop(){
  const grid=document.getElementById('grid-area');
  grid.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';});
  grid.addEventListener('drop',e=>{
    e.preventDefault();
    const type=e.dataTransfer.getData('text/plain');
    if(type!=='color-swatch'&&!type.startsWith('preset:'))return;
    const rect=grid.getBoundingClientRect();
    const rawY=e.clientY-rect.top,rawX=e.clientX-rect.left;
    let text='',color=dragColor||COMFORT_COLORS[0];
    if(type.startsWith('preset:')){
      const idx=parseInt(type.split(':')[1]);
      const p=(gs('PRESETS')||[])[idx];
      if(p){text=p.text;color=ALL_COLORS.find(c=>c.hex===p.color)||color;}
    }
    const freeY=findFreeSlot(rawY,ROW_H-6);
    const blk=createBlock(Math.max(0,rawX-110),freeY,text,color);
    beep('place');
    const dayPts=checkAndUpdateStreak();
    if(dayPts>0)awardPoints(dayPts,e.clientX,e.clientY);
    else awardPoints(5,e.clientX,e.clientY);
    saveWorkspace();updateMissions();dragColor=null;
    selectBlock(blk);
  });
}

    createBlock(parseFloat(block.style.left)+18,newY,t,c,block.offsetWidth,block.offsetHeight);
    saveWorkspace();closeDD();
  }));
  dd.appendChild(mkBtn('⬆','Bring to Front',()=>{block.style.zIndex=(parseInt(block.style.zIndex||10)+10)+'';closeDD();}));
  dd.appendChild(mkDiv());
  const db=mkBtn('🗑','Delete Block',()=>{beep('delete');block.remove();if(selectedBlock===block)selectedBlock=null;saveWorkspace();updateMissions();closeDD();});db.classList.add('danger');dd.appendChild(db);
  portal.appendChild(dd);
  const br=btnEl.getBoundingClientRect();
  let top=br.bottom+4,left=br.right-238;
  if(left<6)left=6;if(left+238>window.innerWidth-6)left=window.innerWidth-244;
  if(top+470>window.innerHeight-6)top=Math.max(6,br.top-475);
  dd.style.top=top+'px';dd.style.left=left+'px';
}

function chatKey(fid){return`tf_chat_${fid}`}
function getChatMsgs(fid){try{return JSON.parse(localStorage.getItem(chatKey(fid)))||[]}catch{return[]}}
function saveChatMsgs(fid,msgs){localStorage.setItem(chatKey(fid),JSON.stringify(msgs.slice(-200)));}

function toggleChat(){
  const ov=document.getElementById('chat-overlay');
  const isOpen=ov.classList.contains('open');
  if(isOpen){ov.classList.remove('open');}
  else{renderChatFriendList();ov.classList.add('open');backToChatList();}
}
function handleChatOverlayClick(e){if(e.target.id==='chat-overlay')toggleChat();}

function renderChatFriendList(){
  const list=document.getElementById('chat-friend-list');list.innerHTML='';
  MOCK_FRIENDS.forEach(f=>{
    const msgs=getChatMsgs(f.id);
    const last=msgs[msgs.length-1];
    const item=document.createElement('div');item.className='chat-friend-item';
    const ago=last?((Date.now()-last.time)<60000?'just now':(Date.now()-last.time)<3600000?Math.round((Date.now()-last.time)/60000)+'m':''):'';
    item.innerHTML=`
      <div class="cf-avatar-wrap">
        <div class="cf-avatar">${f.avatar}</div>
        <div class="cf-online-dot ${f.active?'':'cf-offline-dot'}"></div>
      </div>
      <div class="cf-info">
        <div class="cf-name">${f.name}</div>
        <div class="cf-preview">${last?(last.from==='me'?'You: ':'')+last.text:'Start a conversation…'}</div>
      </div>
      <div class="cf-meta">
        <div class="cf-time">${ago}</div>
      </div>
    `;
    item.addEventListener('click',()=>openChatWith(f));
    list.appendChild(item);
  });
}

function openChatWith(friend){
  activeChatFriendId=friend.id;
  document.getElementById('chat-friend-avatar').textContent=friend.avatar;
  document.getElementById('chat-friend-name').textContent=friend.name;
  const statusEl=document.getElementById('chat-friend-status');
  statusEl.textContent=friend.active?'Online':'Last seen recently';
  statusEl.className='chat-header-status'+(friend.active?' online':'');
  document.getElementById('chat-list-view').style.display='none';
  const mv=document.getElementById('chat-messages-view');mv.classList.add('active');
  renderChatMessages(friend.id);
  // Auto-seed first message if empty
  const msgs=getChatMsgs(friend.id);
  if(!msgs.length){
    const seeds=['Hey! How\'s your schedule looking today? 👀','Have you tried the new block colours? 🎨','What time do you usually wake up? 🌅'];
    const seed=seeds[MOCK_FRIENDS.indexOf(friend)%seeds.length];
    setTimeout(()=>{
      const m=getChatMsgs(friend.id);
      m.push({from:'them',text:seed,time:Date.now()-60000*30});
      saveChatMsgs(friend.id,m);renderChatMessages(friend.id);
    },400);
  }
}
function backToChatList(){
  activeChatFriendId=null;
  document.getElementById('chat-list-view').style.display='flex';
  document.getElementById('chat-messages-view').classList.remove('active');
}
function renderChatMessages(fid){
  const friend=MOCK_FRIENDS.find(f=>f.id===fid);if(!friend)return;
  const scroll=document.getElementById('chat-msgs-scroll');scroll.innerHTML='';
  const msgs=getChatMsgs(fid);
  msgs.forEach(m=>{
    const wrap=document.createElement('div');wrap.className=`msg-wrap ${m.from==='me'?'me':'them'}`;
    const avatar=m.from!=='me'?`<div class="msg-avatar">${friend.avatar}</div>`:'';
    wrap.innerHTML=`${m.from!=='me'?avatar:''}<div><div class="msg-bubble">${escHtml(m.text)}</div><div class="msg-time">${formatTime(m.time)}</div></div>`;
    scroll.appendChild(wrap);
  });
  scroll.scrollTop=scroll.scrollHeight;
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function chatInputKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChatMessage();}}
function sendChatMessage(){
  const input=document.getElementById('chat-input');
  const text=input.value.trim();if(!text||!activeChatFriendId)return;
  input.value='';beep('click');
  const msgs=getChatMsgs(activeChatFriendId);
  msgs.push({from:'me',text,time:Date.now()});
  saveChatMsgs(activeChatFriendId,msgs);
  renderChatMessages(activeChatFriendId);
  renderChatFriendList();
  // Typing indicator + simulated reply
  const fid=activeChatFriendId;
  const tw=document.getElementById('typing-wrap');tw.style.display='block';
  setTimeout(()=>{
    tw.style.display='none';
    const reply=BOT_REPLIES[Math.floor(Math.random()*BOT_REPLIES.length)];
    const m=getChatMsgs(fid);
    m.push({from:'them',text:reply,time:Date.now()});
    saveChatMsgs(fid,m);
    if(activeChatFriendId===fid)renderChatMessages(fid);
    renderChatFriendList();
    beep('chat');
  },1500+Math.random()*1500);
}

function buildDayGrid(year,month){
  const grid=document.getElementById('day-grid');grid.innerHTML='';
  DAYS.forEach(d=>{const h=document.createElement('div');h.className='day-hdr';h.textContent=d;grid.appendChild(h);});
  const fd=new Date(year,month,1).getDay(),dim=new Date(year,month+1,0).getDate();
  for(let i=0;i<fd;i++){const c=document.createElement('div');c.className='day-cell empty';grid.appendChild(c);}
  for(let d=1;d<=dim;d++){

function renderAnalytics(){
  const inner=document.getElementById('analytics-inner');inner.innerHTML='';
  const blocks=getBlocksData();
  const s=getStreakState(),sc=getScoreState();
  inner.innerHTML=`<div class="an-title">Schedule Analytics</div><div class="an-sub">Based on your workspace — ${fmtDisplayDate(currentDateStr)}</div>`;
  if(!blocks.length){
    inner.innerHTML+=`<div class="an-card"><div style="text-align:center;padding:36px 20px;font-size:12px;color:var(--muted)">📊<br><br>No blocks on the workspace yet.<br>Head to <strong>Schedule</strong> to plan your day.</div></div>`;
    return;
  }
  const totalH=blocks.reduce((s,b)=>s+b.durationH,0);
  const freeH=Math.max(0,24-totalH);
  const hourLoad=new Array(24).fill(0);
  blocks.forEach(b=>{const st=Math.floor(b.startH),en=Math.min(24,Math.ceil(b.startH+b.durationH));for(let h=st;h<en;h++)hourLoad[h]++;});
  const busiestH=hourLoad.indexOf(Math.max(...hourLoad));
  const prodScore=Math.min(100,Math.round(totalH/16*100));
  inner.innerHTML+=`<div class="stat-row">
    <div class="stat-card"><div class="stat-val">${blocks.length}</div><div class="stat-lbl">Blocks</div></div>
    <div class="stat-card"><div class="stat-val">${totalH.toFixed(1)}h</div><div class="stat-lbl">Scheduled</div></div>
    <div class="stat-card"><div class="stat-val">${busiestH.toString().padStart(2,'0')}:00</div><div class="stat-lbl">Peak Hour</div></div>
    <div class="stat-card"><div class="stat-val">${prodScore}%</div><div class="stat-lbl">Prod Score</div></div>
  </div>`;
  const anGrid=document.createElement('div');anGrid.className='an-grid';
  // Pie
  const colorMap={};
  blocks.forEach(b=>{const k=b.hex;if(!colorMap[k])colorMap[k]={color:b.hex,fg:b.fg,name:ALL_COLORS.find(c=>c.hex===b.hex)?.name||'Block',hours:0};colorMap[k].hours+=b.durationH;});
  if(freeH>0)colorMap['__free']={color:'#E8E0D8',fg:'#9C8B82',name:'Free',hours:freeH};
  const slices=Object.values(colorMap).sort((a,b)=>b.hours-a.hours);
  const totalAll=slices.reduce((s,x)=>s+x.hours,0);
  const pieCard=document.createElement('div');pieCard.className='an-card';
  pieCard.innerHTML=`<div class="an-card-title">Time Breakdown</div><div class="an-card-sub">Colour distribution across 24h</div>`;
  const pw=document.createElement('div');pw.id='pie-wrap';
  const canvas=document.createElement('canvas');canvas.id='pie-canvas';canvas.width=148;canvas.height=148;pw.appendChild(canvas);
  const legend=document.createElement('div');legend.id='pie-legend';
  slices.forEach(s=>{
    const pct=(s.hours/totalAll*100).toFixed(0);
    legend.innerHTML+=`<div class="legend-item"><div class="legend-dot" style="background:${s.color}"></div><span style="flex:1;font-size:10.5px">${s.name}</span><span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">${pct}% · ${s.hours.toFixed(1)}h</span></div>`;
  });
  pw.appendChild(legend);pieCard.appendChild(pw);anGrid.appendChild(pieCard);
  requestAnimationFrame(()=>{
    const ctx=canvas.getContext('2d');let a=-Math.PI/2;
    slices.forEach(s=>{const sw=s.hours/totalAll*Math.PI*2;ctx.beginPath();ctx.moveTo(74,74);ctx.arc(74,74,64,a,a+sw);ctx.closePath();ctx.fillStyle=s.color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();a+=sw;});
    ctx.beginPath();ctx.arc(74,74,26,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.fillStyle='#9C8B82';ctx.textAlign='center';ctx.font='bold 9px DM Sans,sans-serif';ctx.fillText(blocks.length+' blocks',74,78);
  });
  // Bar
  const barCard=document.createElement('div');barCard.className='an-card';
  barCard.innerHTML=`<div class="an-card-title">Hourly Load</div><div class="an-card-sub">Block density per hour</div>`;
  const bc=document.createElement('div');bc.id='bar-chart';
  const maxL=Math.max(...hourLoad,1);
  for(let h=0;h<24;h++){
    const col=document.createElement('div');col.className='bar-col';
    const fill=document.createElement('div');fill.className='bar-fill';
    fill.style.background=hourLoad[h]>0?`hsl(${28+h*4},55%,${55-hourLoad[h]*5}%)`:'#ede8e2';
    fill.style.height=(hourLoad[h]/maxL*90)+'%';
    fill.setAttribute('data-tip',`${h.toString().padStart(2,'0')}:00 · ${hourLoad[h]} block${hourLoad[h]!==1?'s':''}`);
    const lbl=document.createElement('div');lbl.className='bar-lbl';lbl.textContent=h%4===0?h.toString().padStart(2,'0'):'';
    col.appendChild(fill);col.appendChild(lbl);bc.appendChild(col);
  }
  barCard.appendChild(bc);anGrid.appendChild(barCard);
  // Insights
  const insCard=document.createElement('div');insCard.className='an-card full';
  const pcol=prodScore>=75?'#4CAF50':prodScore>=50?'#B87333':'#FF7B22';
  insCard.innerHTML=`<div class="an-card-title">Productivity Insights</div><div class="an-card-sub">AI-style analysis of your schedule</div>
  <div style="display:flex;gap:18px;flex-wrap:wrap;margin-top:8px">
    <div style="flex:1;min-width:180px">
      <div style="font-size:10.5px;color:var(--muted);margin-bottom:4px">Productivity Score</div>
      <div class="prod-bar"><div class="prod-fill" style="width:${prodScore}%;background:${pcol}"></div></div>
      <div style="font-size:9.5px;color:var(--muted);margin-top:3px">${prodScore}% — ${prodScore>=75?'Excellent! 🔥':prodScore>=50?'Good work ✅':'Keep adding blocks 💡'}</div>
    </div>
    <div style="flex:1;min-width:180px">
      <div style="font-size:10.5px;color:var(--muted);margin-bottom:4px">Time Balance</div>
      <div style="font-size:11.5px;color:var(--text);line-height:1.8">${totalH.toFixed(1)}h scheduled · ${freeH.toFixed(1)}h free<br>Peak: ${busiestH.toString().padStart(2,'0')}:00–${(busiestH+1).toString().padStart(2,'0')}:00</div>
    </div>
    <div style="flex:1;min-width:180px">
      <div style="font-size:10.5px;color:var(--muted);margin-bottom:4px">Gamification</div>
      <div style="font-size:11.5px;color:var(--text);line-height:1.8">🔥 ${s.count}-day streak<br>⭐ ${(sc.total||0).toLocaleString()} pts · Lv ${Math.floor((sc.total||0)/500)+1}</div>
    </div>
  </div>`;
  anGrid.appendChild(insCard);inner.appendChild(anGrid);
}
