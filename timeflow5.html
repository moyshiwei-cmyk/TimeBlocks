// ════════════════════════════════════════════
//  BUSINESS VIEW
// ════════════════════════════════════════════
const BIZ_ROW_H=44;
function getBiz(){
  return gs('BIZ')||{
    employees:[
      {id:1,name:'Alice Johnson',role:'Designer',color:EMP_COLORS[0],initials:'AJ'},
      {id:2,name:'Bob Smith',role:'Developer',color:EMP_COLORS[1],initials:'BS'},
      {id:3,name:'Cora Lee',role:'Manager',color:EMP_COLORS[2],initials:'CL'},
      {id:4,name:'Dan Kim',role:'Marketing',color:EMP_COLORS[3],initials:'DK'},
    ],
    shifts:[
      {id:1,empId:1,start:9,end:17,label:'Design Sprint'},
      {id:2,empId:2,start:10,end:18,label:'Dev Work'},
      {id:3,empId:3,start:8,end:16,label:'Management'},
      {id:4,empId:4,start:11,end:17,label:'Campaign'},
    ],
    nextId:5,nextEmpId:5
  };
}
function saveBiz(b){ss('BIZ',b);}
function bizChangeWeek(n){
  bizWeekOffset+=n;const base=new Date();base.setDate(base.getDate()+bizWeekOffset*7);
  const start=new Date(base);start.setDate(base.getDate()-base.getDay());const end=new Date(start);end.setDate(start.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en',{month:'short',day:'numeric'});
  document.getElementById('biz-week-label').textContent=`${fmt(start)} – ${fmt(end)}`;
  renderBusiness();
}
function renderBusiness(){
  const biz=getBiz();
  const el=document.getElementById('emp-list');el.innerHTML='';
  biz.employees.forEach(emp=>{
    const hrs=biz.shifts.filter(s=>s.empId===emp.id).reduce((s,sh)=>s+(sh.end-sh.start),0);
    const item=document.createElement('div');item.className='emp-sidebar-item';
    item.innerHTML=`<div class="emp-sb-av" style="background:${emp.color}">${emp.initials}</div><div class="emp-sb-info"><div class="emp-sb-name">${emp.name}</div><div class="emp-sb-role">${emp.role}</div></div><div class="emp-sb-hrs">${hrs}h</div><div class="emp-edit-row"><button class="emp-edit-btn" onclick="editEmp(${emp.id},event)" title="Edit">✏️</button><button class="emp-edit-btn" onclick="deleteEmp(${emp.id},event)" title="Delete">🗑</button></div>`;
    el.appendChild(item);
  });
  const allShifts=biz.shifts;
  const totalH=allShifts.reduce((s,sh)=>s+(sh.end-sh.start),0);
  document.getElementById('bs-shifts').textContent=allShifts.length;
  document.getElementById('bs-hours').textContent=totalH+'h';
  document.getElementById('bs-emp').textContent=biz.employees.length;
  let conflicts=0;
  biz.employees.forEach(emp=>{const s=allShifts.filter(s=>s.empId===emp.id).sort((a,b)=>a.start-b.start);for(let i=1;i<s.length;i++)if(s[i].start<s[i-1].end)conflicts++;});
  const ce=document.getElementById('bs-conf');ce.textContent=conflicts;ce.style.color=conflicts?'#EF4444':'var(--accent)';
  // Grid
  const bizGrid=document.getElementById('biz-grid');
  bizGrid.querySelectorAll('.emp-col').forEach(c=>c.remove());
  const tc=document.getElementById('biz-tc');tc.innerHTML='';
  const hdr=document.createElement('div');hdr.className='biz-tc-hdr';tc.appendChild(hdr);
  for(let h=0;h<24;h++){const lbl=document.createElement('div');lbl.className='biz-tc-lbl';lbl.textContent=h.toString().padStart(2,'0')+':00';tc.appendChild(lbl);}
  biz.employees.forEach(emp=>{
    const col=document.createElement('div');col.className='emp-col';
    const ch=document.createElement('div');ch.className='emp-col-hdr';
    ch.innerHTML=`<div class="emp-hdr-av" style="background:${emp.color}">${emp.initials}</div><div><div class="emp-hdr-name">${emp.name.split(' ')[0]}</div><div class="emp-hdr-role">${emp.role}</div></div>`;
    col.appendChild(ch);
    for(let h=0;h<24;h++){const row=document.createElement('div');row.className='biz-row-bg';row.style.top=(h*BIZ_ROW_H+40)+'px';col.appendChild(row);}
    biz.shifts.filter(s=>s.empId===emp.id).forEach(sh=>{
      const overlap=biz.shifts.filter(s2=>s2.empId===emp.id&&s2.id!==sh.id&&sh.start<s2.end&&sh.end>s2.start).length>0;
      const shEl=document.createElement('div');shEl.className='biz-shift'+(overlap?' conflict':'');
      shEl.style.cssText=`top:${sh.start*BIZ_ROW_H+40}px;height:${(sh.end-sh.start)*BIZ_ROW_H-4}px;background:${emp.color};color:#000`;
      shEl.innerHTML=`<div class="biz-shift-label">${sh.label}</div><div class="biz-shift-time">${sh.start.toString().padStart(2,'0')}:00–${sh.end.toString().padStart(2,'0')}:00</div>`;
      col.appendChild(shEl);
    });
    bizGrid.appendChild(col);
  });
  if(!document.getElementById('biz-week-label').textContent.includes('–')){
    const base=new Date();const start=new Date(base);start.setDate(base.getDate()-base.getDay());const end=new Date(start);end.setDate(start.getDate()+6);
    const fmt=d=>d.toLocaleDateString('en',{month:'short',day:'numeric'});
    document.getElementById('biz-week-label').textContent=`${fmt(start)} – ${fmt(end)}`;
  }
  setTimeout(()=>{const gw=document.getElementById('biz-grid-wrap');if(gw)gw.scrollTop=9*BIZ_ROW_H+40-60;},100);
}
function editEmp(id,e){
  e.stopPropagation();const biz=getBiz();const emp=biz.employees.find(x=>x.id===id);if(!emp)return;
  showModal({title:'Edit Employee',body:`<label class="tf-label">Name</label><input class="tf-input" id="en" value="${escHtml(emp.name)}"/><label class="tf-label">Role</label><input class="tf-input" id="er" value="${escHtml(emp.role)}"/>`,btn:'Save',onConfirm:()=>{
    emp.name=document.getElementById('en').value.trim()||emp.name;
    emp.role=document.getElementById('er').value.trim()||emp.role;
    emp.initials=emp.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    saveBiz(biz);renderBusiness();return true;
  }});
}
function deleteEmp(id,e){
  e.stopPropagation();if(!confirm('Delete this employee?'))return;
  const biz=getBiz();biz.employees=biz.employees.filter(x=>x.id!==id);biz.shifts=biz.shifts.filter(s=>s.empId!==id);
  saveBiz(biz);renderBusiness();showToast('Employee removed');
}
function showAddEmpModal(){
  showModal({title:'Add Employee',body:`<label class="tf-label">Full Name</label><input class="tf-input" id="ename" placeholder="e.g. Sarah Connor"/><label class="tf-label">Role</label><input class="tf-input" id="erole" placeholder="e.g. Designer"/>`,btn:'Add Employee',onConfirm:()=>{
    const name=document.getElementById('ename').value.trim();const role=document.getElementById('erole').value.trim();
    if(!name){showToast('Enter a name');return false;}
    const biz=getBiz();const color=EMP_COLORS[biz.employees.length%EMP_COLORS.length];
    biz.employees.push({id:biz.nextEmpId++,name,role:role||'Staff',color,initials:name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()});
    saveBiz(biz);renderBusiness();showToast(`${name} added ✓`);return true;
  }});
}

// ════════════════════════════════════════════
//  PROFILE VIEW
// ════════════════════════════════════════════
function renderProfile(){
  const inner=document.getElementById('profile-inner');inner.innerHTML='';
  const s=getStreak(),sc=getScore(),cc=getCharState();
  const level=Math.floor((sc.total||0)/500)+1;
  const xpInLevel=(sc.total||0)%500,xpPct=xpInLevel/500*100;
  const ac=CHARACTERS.find(c=>c.id===sc.activeChar)||CHARACTERS[0];
  inner.innerHTML=`
    <div class="view-title">Profile</div>
    <div class="view-sub">Your progress, characters & achievements</div>
    <div class="profile-hero">
      <div class="ph-avatar">${ac.emoji}<div class="ph-lvl">Lv ${level}</div></div>
      <div class="ph-stats">
        <div class="ph-name">Time Architect</div>
        <div class="ph-tag">Active: ${ac.name} (${ac.rarity}) · ${ac.bonus} bonus</div>
        <div class="ph-row">
          <div class="ph-stat"><div class="ph-stat-val">${(sc.total||0).toLocaleString()}</div><div class="ph-stat-lbl">Points</div></div>
          <div class="ph-stat"><div class="ph-stat-val">${s.count}</div><div class="ph-stat-lbl">Streak</div></div>
          <div class="ph-stat"><div class="ph-stat-val">${s.shields||0}</div><div class="ph-stat-lbl">Shields</div></div>
          <div class="ph-stat"><div class="ph-stat-val">${cc.unlocked.length}/${CHARACTERS.length}</div><div class="ph-stat-lbl">Characters</div></div>
        </div>
        <div class="xp-section">
          <div class="xp-bar"><div class="xp-fill" style="width:${xpPct}%"></div></div>
          <div class="xp-label"><span>Lv ${level}</span><span>${xpInLevel}/500 XP</span><span>Lv ${level+1}</span></div>
        </div>
      </div>
    </div>
    <div class="chars-section" id="chars-section"></div>
  `;
  const cs=document.getElementById('chars-section');
  ['common','rare','epic','legendary'].forEach(rarity=>{
    const chars=CHARACTERS.filter(c=>c.rarity===rarity);
    const section=document.createElement('div');
    const rc={common:'var(--r-common)',rare:'var(--r-rare,#5B8DD9)',epic:'var(--r-epic,#9B59B6)',legendary:'var(--r-legendary,#E6A817)'};
    section.innerHTML=`<div class="chars-rarity-label" style="color:${rc[rarity]}">${rarity}</div>`;
    const grid=document.createElement('div');grid.className='chars-grid';
    chars.forEach(ch=>{
      const unlocked=cc.unlocked.includes(ch.id);const isActive=sc.activeChar===ch.id;
      const card=document.createElement('div');card.className=`char-card r-${ch.rarity}${!unlocked?' locked':''}${isActive?' active-char':''}`;
      card.innerHTML=`${isActive?'<div class="char-active-badge">Active</div>':''}${!unlocked?'<div style="position:absolute;top:6px;right:6px;font-size:11px;opacity:.6">🔒</div>':''}
      <span class="char-emoji">${ch.emoji}</span><div class="char-name">${ch.name}</div>
      <div class="char-rarity r-${ch.rarity}">${ch.rarity}</div><div class="char-bonus">${ch.bonus}</div>
      <div class="char-pts">${unlocked?'✓ Unlocked':(ch.pts===0?'Starter':ch.pts.toLocaleString()+' pts')}</div>`;
      if(unlocked&&!isActive){card.title=`Click to activate ${ch.name}`;card.addEventListener('click',()=>{sc.activeChar=ch.id;ss('SCORE',sc);renderProfile();updateStreakUI();showToast(`${ch.emoji} ${ch.name} activated!`);beep('click');});}
      grid.appendChild(card);
    });
    section.appendChild(grid);cs.appendChild(section);
  });
}

// ════════════════════════════════════════════
//  MODAL SYSTEM
// ════════════════════════════════════════════
function showModal({title,body,btn,onConfirm}){
  const ov=document.createElement('div');ov.className='modal-ov';
  ov.innerHTML=`<div class="modal"><button class="modal-close" onclick="this.closest('.modal-ov').remove()">✕</button><div class="modal-title">${title}</div>${body}<button class="modal-btn" id="modal-confirm-btn">${btn||'Confirm'}</button></div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.body.appendChild(ov);
  if(onConfirm){
    ov.querySelector('#modal-confirm-btn').addEventListener('click',()=>{if(onConfirm()!==false)ov.remove();});
  }
}

// ════════════════════════════════════════════
//  VIEW SWITCHING
// ════════════════════════════════════════════
const VIEW_TITLES={home:'Schedule',categories:'Categories','important-dates':'Important Dates',analytics:'Analytics',friends:'Friends',messages:'Messages',business:'Business',profile:'Profile'};
function switchView(view){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item[data-view]').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.mbn-item[data-view]').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('view-'+view);if(el)el.classList.add('active');
  document.querySelector(`.nav-item[data-view="${view}"]`)?.classList.add('active');
  document.querySelector(`.mbn-item[data-view="${view}"]`)?.classList.add('active');
  document.getElementById('topbar-title').textContent=VIEW_TITLES[view]||view;
  document.getElementById('date-nav').classList.toggle('hidden',view!=='home');
  // On-switch renders
  if(view==='analytics')renderAnalytics();
  if(view==='categories')renderCategoriesView();
  if(view==='important-dates')renderDates();
  if(view==='friends')renderFriends();
  if(view==='messages')renderMsgList();
  if(view==='business')renderBusiness();
  if(view==='profile')renderProfile();
  beep('click');
}

  const cc=getCharState();if(!cc.unlocked.includes('neko')){cc.unlocked.push('neko');ss('CHARS',cc);}

  setTimeout(()=>{const ws=document.getElementById('ws-scroll');if(ws)ws.scrollTop=Math.max(0,today.getHours()*ROW_H-120);},200);
  // Init cat side panel open by default in home
  document.getElementById('cat-side-panel').classList.add('open');

  document.getElementById('dnav-label').textContent=dateDisplayStr(fmtDate(today));
